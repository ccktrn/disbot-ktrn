services:
  ktrn-bot:
    container_name: ktrn-bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped
    
    volumes:
      - ./data:/app/data

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_URL=http://searxng:8080
    volumes:
      - ./searxng-config.yml:/etc/searxng/settings.yml:ro
