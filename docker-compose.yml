services:
  discord-bot:
    container_name: discord-bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    
    # ダウンロード中の一時ファイルを確認したい場合のみ、以下のコメント(#)を外してください
    # volumes:
    #   - ./outputs:/app/outputs
    volumes:
      - ./data:/app/data